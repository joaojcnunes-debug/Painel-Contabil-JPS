name: Deploy Supabase Functions

# Dispara em qualquer push no main que altere Edge Functions ou este workflow.
# Deploya TODAS as funções em supabase/functions/* (idempotente — só re-envia
# as que mudaram no bundle real).
#
# Setup necessário (1 vez):
#   1) GitHub → repo Settings → Secrets and variables → Actions → New secret
#      - Nome: SUPABASE_ACCESS_TOKEN
#      - Valor: gera em https://supabase.com/dashboard/account/tokens
#
# Se quiser deployar migrations também via CI:
#   Adicione o segundo secret SUPABASE_DB_PASSWORD (senha do banco de dados)
#   e ative o job push-migrations abaixo.

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy-supabase-functions.yml"
  workflow_dispatch:

env:
  SUPABASE_PROJECT_REF: mwmltqaanfxjkoztgcby

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          # SEM `set -e` — se uma função falha, continua nas outras.
          # Retry 3x em cada função (esm.sh Cloudflare 522 é intermitente).
          FAILED=()
          for fn_dir in supabase/functions/*/; do
            name=$(basename "$fn_dir")
            if [ "$name" = "_shared" ]; then
              continue
            fi
            echo "════════════════════════════════════════════"
            echo "▶ Deploying: $name"
            echo "════════════════════════════════════════════"
            for attempt in 1 2 3; do
              if supabase functions deploy "$name" --project-ref "$SUPABASE_PROJECT_REF"; then
                echo "✓ $name deployed (attempt $attempt)"
                break
              fi
              if [ "$attempt" -lt 3 ]; then
                echo "⚠ $name failed on attempt $attempt, retrying in 10s..."
                sleep 10
              else
                echo "✗ $name FAILED after 3 attempts"
                FAILED+=("$name")
              fi
            done
          done
          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "FALHAS: ${FAILED[*]}"
            exit 1
          fi
          echo "✓ All functions deployed"
